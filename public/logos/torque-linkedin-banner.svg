<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" aria-label="Torque LinkedIn Banner">
  <!-- Background -->
  <rect width="1584" height="396" fill="#05080F"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0C1219" stroke-width="1"/>
    </pattern>

    <!-- Gradient overlay -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#05080F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1420;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3060;stop-opacity:0.8" />
    </linearGradient>

    <!-- Glow effect -->
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Grid background -->
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Gradient overlay -->
  <rect width="1584" height="396" fill="url(#blueGradient)" opacity="0.6"/>

  <!-- Glow accent on right side -->
  <ellipse cx="1300" cy="198" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Wordmark and tagline (centered) -->
  <g transform="translate(792, 198)">
    <!-- TORQUE -->
    <text x="0" y="0" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="110" letter-spacing="19.8" fill="#F0F4F8" text-anchor="middle">TORQUE</text>

    <!-- Tagline -->
    <text x="0" y="38" font-family="'Inter', sans-serif" font-size="18" letter-spacing="9.9" fill="#4A6080" text-anchor="middle">LEVERAGE YOUR NETWORK</text>

    <!-- Decorative underline -->
    <line x1="-200" y1="58" x2="200" y2="58" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Decorative network nodes (right side) -->
  <g opacity="0.15">
    <circle cx="1200" cy="100" r="6" fill="#2563EB"/>
    <circle cx="1280" cy="140" r="8" fill="#3B82F6"/>
    <circle cx="1350" cy="180" r="5" fill="#93C5FD"/>
    <circle cx="1240" cy="220" r="7" fill="#2563EB"/>
    <circle cx="1320" cy="260" r="6" fill="#3B82F6"/>
    <circle cx="1400" cy="120" r="9" fill="#22D3EE"/>
    <circle cx="1460" cy="200" r="5" fill="#93C5FD"/>

    <!-- Connection lines between nodes -->
    <line x1="1200" y1="100" x2="1280" y2="140" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="1280" y1="140" x2="1350" y2="180" stroke="#3B82F6" stroke-width="1.5"/>
    <line x1="1280" y1="140" x2="1240" y2="220" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="1350" y1="180" x2="1320" y2="260" stroke="#93C5FD" stroke-width="1.5"/>
    <line x1="1200" y1="100" x2="1400" y2="120" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="1400" y1="120" x2="1460" y2="200" stroke="#93C5FD" stroke-width="1.5"/>
  </g>

  <!-- Accent line at bottom -->
  <rect x="0" y="392" width="1584" height="4" fill="url(#blueGradient)"/>
</svg>
